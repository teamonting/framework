services:
  chrome:
    image: selenium/standalone-chrome:latest

    environment:
      SE_NODE_SESSION_TIMEOUT: 15
    ports:
      - 4444:4444
      - 7900:7900
    shm_size: '2.5gb'

  web:
    image: node:24-alpine

    entrypoint:
      - npx
      - serve@14.2.6
      - /var/web/
      - --cors
    ports:
      - 3000:3000
    stop_grace_period: 1s
    volumes:
      - ../dist/:/var/web/dist/
      - ./scenario/:/var/web/scenario/
