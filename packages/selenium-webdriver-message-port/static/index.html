<!DOCTYPE html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "message-port-rpc": "https://esm.sh/message-port-rpc"
        }
      }
    </script>
  </head>
  <script type="module">
    import { messagePortRPC } from 'message-port-rpc';
    import './browser.js';

    const { webdriverMessagePort } = navigator;

    webdriverMessagePort.addEventListener('message', ({ data, ports }) => {
      console.log(`BROWSER RECEIVE (numPort=${ports.length}): ${data}`);

      ports[0]?.postMessage('Good morning!');
    });

    webdriverMessagePort.start();

    const { port1, port2 } = new MessageChannel();

    port1.addEventListener('message', ({ data }) => {
      console.log(`BROWSER RECEIVE 2: ${data}`);
    });

    port1.start();

    webdriverMessagePort.postMessage('Aloha!', [port2]);
  </script>
</html>
