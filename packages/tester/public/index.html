<!doctype html>
<html lang="en">
  <head> </head>
  <body>
    <script type="module">
      import { messagePort } from 'https://cdn.jsdelivr.net/npm/@onting/selenium-webdriver-message-port/dist/browser.js';
      import { messagePortRPC as rpc } from 'https://esm.sh/message-port-rpc';

      const result = await rpc(messagePort)();

      const headingElement = document.createElement('h1');

      headingElement.textContent = result;

      document.body.appendChild(headingElement);
    </script>
  </body>
</html>
